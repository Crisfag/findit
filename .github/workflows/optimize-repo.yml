name: 🚀 Optimize Find It Repo

on:
  workflow_dispatch: # Déclenché manuellement en un clic

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # ─── .gitignore ──────────────────────────────────────────
      - name: 📝 Create .gitignore
        run: |
          cat > .gitignore << 'EOF'
          # Environnement
          .env
          .env.local
          .env.development
          .env.production
          .env.*.local

          # Netlify
          .netlify/
          netlify/functions/node_modules/

          # Node.js
          node_modules/
          npm-debug.log*
          yarn-debug.log*
          yarn-error.log*
          package-lock.json
          yarn.lock

          # Éditeurs
          .vscode/
          .idea/
          *.swp
          *.swo
          .DS_Store
          Thumbs.db

          # Build
          dist/
          build/
          .cache/

          # Logs
          logs/
          *.log

          # Tests
          coverage/
          .nyc_output/

          # Divers
          *.bak
          *.tmp
          .temp/
          EOF

      # ─── .env.example ────────────────────────────────────────
      - name: 🔑 Create .env.example
        run: |
          cat > .env.example << 'EOF'
          # Find It — Variables d'environnement
          # Copie ce fichier en .env et remplis tes clés
          # ⚠️ Ne jamais committer le fichier .env sur GitHub !

          # SerpApi — Google Shopping en temps réel
          # Obtenir sur : https://serpapi.com/manage-api-key
          SERPAPI_KEY=ta_clé_serpapi_ici

          # Anthropic Claude — Vision IA + scoring sémantique
          # Obtenir sur : https://console.anthropic.com/settings/keys
          ANTHROPIC_API_KEY=sk-ant-ta_clé_anthropic_ici
          EOF

      # ─── netlify.toml ─────────────────────────────────────────
      - name: ⚙️ Update netlify.toml
        run: |
          cat > netlify.toml << 'EOF'
          # Find It — Configuration Netlify

          [build]
            publish = "."
            functions = "netlify/functions"

          [context.production.environment]
            NODE_ENV = "production"

          [context.deploy-preview.environment]
            NODE_ENV = "staging"

          [functions]
            node_bundler = "esbuild"

          [[redirects]]
            from = "/api/search"
            to = "/.netlify/functions/search"
            status = 200

          [[redirects]]
            from = "/api/analyze"
            to = "/.netlify/functions/analyze-image"
            status = 200

          [[headers]]
            for = "/*"
            [headers.values]
              X-Frame-Options = "DENY"
              X-Content-Type-Options = "nosniff"
              X-XSS-Protection = "1; mode=block"
              Referrer-Policy = "strict-origin-when-cross-origin"
              Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

          [[headers]]
            for = "/*.js"
            [headers.values]
              Cache-Control = "public, max-age=3600"

          [[headers]]
            for = "/*.css"
            [headers.values]
              Cache-Control = "public, max-age=3600"

          [[headers]]
            for = "/*.html"
            [headers.values]
              Cache-Control = "no-cache"

          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200
          EOF

      # ─── CHANGELOG.md ────────────────────────────────────────
      - name: 📋 Create CHANGELOG.md
        run: |
          cat > CHANGELOG.md << 'EOF'
          # Changelog — Find It

          Format basé sur [Keep a Changelog](https://keepachangelog.com/fr/1.0.0/).

          ---

          ## [1.2.0] — 2025-06-04

          ### Ajouté
          - 🔬 Enrichissement automatique des requêtes par Claude
          - 👁 Analyse visuelle des thumbnails pour le scoring
          - 🗺 Carte mondiale interactive avec pins dynamiques
          - 📝 Description fallback quand SerpApi ne retourne rien

          ### Corrigé
          - ✅ Bouton "Voir l'offre" — vrai lien natif
          - ✅ Carte interactive — tooltip cliquable
          - ✅ Score de ressemblance — plus réaliste et strict

          ---

          ## [1.1.0] — 2025-06-03

          ### Ajouté
          - 🤖 Scoring de ressemblance intelligent via Claude Haiku
          - 📊 Raison du score affichée sous chaque badge
          - 🔄 Requêtes alternatives en parallèle

          ### Corrigé
          - ✅ Scores irréalistes (96% pour une robe blanche)

          ---

          ## [1.0.1] — 2025-06-02

          ### Ajouté
          - 📸 Analyse d'image par Claude Vision
          - 🔍 Identification automatique du produit photographié
          - ✏️ Modification de la requête avant recherche

          ---

          ## [1.0.0] — 2025-06-01

          ### Ajouté
          - 🚀 Lancement initial de Find It
          - 🔍 Recherche Google Shopping via SerpApi
          - 🎛 Filtres avancés (prix, couleur, taille, matière)
          - 📋 Vue liste et vue grille
          - 👤 Espace personnel (UI)
          - 🔒 APIs sécurisées via Netlify Functions
          EOF

      # ─── README.md ───────────────────────────────────────────
      - name: 📖 Update README.md
        run: |
          cat > README.md << 'EOF'
          # 🛍️ Find It — Recherche de produits mondiale par IA

          > Trouvez n'importe quel article dans le monde entier — par texte ou par photo.

          [![Netlify Status](https://api.netlify.com/api/v1/badges/rad-manatee-f5b617/deploy-status)](https://rad-manatee-f5b617.netlify.app)
          ![Version](https://img.shields.io/badge/version-1.2.0-orange)
          ![License](https://img.shields.io/badge/license-MIT-blue)

          ---

          ## ✨ Fonctionnalités

          | Fonctionnalité | Statut |
          |---|---|
          | 🔍 Recherche textuelle Google Shopping | ✅ Actif |
          | 📸 Analyse d'image par Claude Vision | ✅ Actif |
          | 🤖 Scoring de ressemblance intelligent | ✅ Actif |
          | 🔬 Requêtes enrichies automatiquement | ✅ Actif |
          | 🗺 Carte mondiale interactive | ✅ Actif |
          | 🎛 Filtres avancés | ✅ Actif |
          | 👤 Espace personnel | 🔄 En cours |
          | 📱 App mobile native | 📅 Planifié |

          ---

          ## 🚀 Démo en ligne

          🌐 **[rad-manatee-f5b617.netlify.app](https://rad-manatee-f5b617.netlify.app)**

          ---

          ## 🏗 Architecture

          ```
          findit/
          ├── index.html                    # Point d'entrée HTML
          ├── app.jsx                       # Application React principale
          ├── style.css                     # Styles (dark mode, responsive)
          ├── netlify.toml                  # Configuration Netlify
          ├── .gitignore                    # Fichiers exclus de Git
          ├── .env.example                  # Template variables d'environnement
          ├── netlify/
          │   └── functions/
          │       ├── search.js             # API Google Shopping + scoring IA
          │       └── analyze-image.js     # Analyse d'image Claude Vision
          └── README.md                     # Ce fichier
          ```

          ---

          ## ⚙️ Stack technique

          - **Frontend** : React 18 (CDN), CSS Variables, Dark Mode
          - **Backend** : Netlify Functions (Node.js serverless)
          - **APIs** :
            - [SerpApi](https://serpapi.com) — Google Shopping temps réel
            - [Anthropic Claude](https://anthropic.com) — Vision IA + scoring
          - **Hébergement** : Netlify (déploiement auto depuis GitHub)

          ---

          ## 🔧 Installation locale

          ```bash
          # 1. Cloner le repo
          git clone https://github.com/crisfag/findit.git
          cd findit

          # 2. Installer Netlify CLI
          npm install -g netlify-cli

          # 3. Configurer les variables
          cp .env.example .env
          # Remplis .env avec tes clés API

          # 4. Lancer en local
          netlify dev
          # → http://localhost:8888
          ```

          ---

          ## 💰 Coûts estimés

          | Service | Plan | Coût/mois |
          |---|---|---|
          | Netlify | Free | 0€ |
          | SerpApi | Starter | ~23€ |
          | Anthropic | Pay-as-you-go | ~5-15€ |
          | **Total** | | **~28-38€** |

          ---

          ## 📈 Roadmap

          - [ ] v1.3 — Authentification utilisateur (Supabase)
          - [ ] v1.4 — Historique et favoris persistants
          - [ ] v1.5 — Notifications nouveautés 03:00 UTC
          - [ ] v1.6 — Comparateur de prix multi-sources
          - [ ] v2.0 — Application mobile React Native
          - [ ] v2.1 — Extension Chrome/Firefox
          - [ ] v2.2 — Mode scan AR temps réel

          ---

          ## 📄 Licence

          MIT © 2025 Find It

          ---

          *Fait avec ❤️ et Claude AI*
          EOF

      # ─── Commit & Push ───────────────────────────────────────
      - name: 📦 Commit & push all changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: 🚀 optimize repo structure

          - Add .gitignore (protect .env, exclude node_modules)
          - Add .env.example (secure API key template)
          - Add CHANGELOG.md (version history)
          - Update README.md (professional docs with badges)
          - Update netlify.toml (security headers, cache, redirects)"
          git push
